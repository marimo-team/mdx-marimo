packages:
  - "apps/*"
  - "examples/*"
  - "packages/*"
nodeLinker: hoisted
minimumReleaseAge: 20160
minimumReleaseAgeExclude:
  - "@marimo-team/*"
allowBuilds:
  "@manzt/uv": true
  "@parcel/watcher": true
  core-js: true
  esbuild: true
  sharp: true
verifyDepsBeforeRun: install
blockExoticSubdeps: true
trustPolicy: no-downgrade
onlyBuiltDependencies: []
