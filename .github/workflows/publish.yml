name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifact
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.node-version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Read Node.js version
        id: node-version
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          version: 0.2.4
          node-version: ${{ steps.node-version.outputs.version }}
          sfw: true
          cache: false
          run-install: |
            - args: ['--frozen-lockfile']

      - name: Check workspace
        run: pnpm ready

      - name: Pack npm package
        run: pnpm pack:mdx --pack-destination ../../dist/npm

      - name: Upload npm package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-package
          path: dist/npm/marimo-team-mdx-marimo-*.tgz
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/org/marimo-team
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ needs.build.outputs.node-version }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download npm package
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: npm-package
          path: dist/npm

      - name: Publish mdx-marimo
        run: npx --yes npm@11.12.1 publish --access public dist/npm/marimo-team-mdx-marimo-*.tgz

  release-notes:
    name: Update release notes
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Read Node.js version
        id: node-version
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          package-manager-cache: false

      - name: Update release notes
        run: npx changelogithub@14.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
